name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build, such as refs/tags/v2.0.10
        required: true
        type: string
      version:
        description: Release version without the v prefix, such as 2.0.10
        required: true
        type: string
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - '**.py'
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.dockerignore'
      - 'templates/**'
      - 'static/**'
      - 'deploy/**'
      - '.github/workflows/docker-build-push.yml'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dovelanlan/mail-manager

jobs:
  build-from-event:
    if: ${{ inputs.version == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker metadata
        id: meta
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:sha-${GITHUB_SHA}"
            if [[ "${GITHUB_REF_TYPE}" == "branch" ]]; then
              echo "${IMAGE}:${GITHUB_REF_NAME}"
              if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
                echo "${IMAGE}:latest"
              fi
            fi
            if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
              echo "${IMAGE}:${GITHUB_REF_NAME}"
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

  build-from-release:
    if: ${{ inputs.version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release Docker metadata
        id: meta
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:v${{ inputs.version }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=v${{ inputs.version }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}
