services:
  mail-manager:
    image: ${MAIL_MANAGER_IMAGE:?set MAIL_MANAGER_IMAGE}
    container_name: mail-manager
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      FLASK_ENV: production
      LOGIN_PASSWORD: ${LOGIN_PASSWORD:?set LOGIN_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      GPTMAIL_BASE_URL: ${GPTMAIL_BASE_URL:-https://mail.chatgpt.org.uk}
      GPTMAIL_API_KEY: ${GPTMAIL_API_KEY:-gpt-test}
      DUCKMAIL_BASE_URL: ${DUCKMAIL_BASE_URL:-https://api.duckmail.sbs}
      DUCKMAIL_API_KEY: ${DUCKMAIL_API_KEY:-}
      CLOUDFLARE_WORKER_DOMAIN: ${CLOUDFLARE_WORKER_DOMAIN:-}
      CLOUDFLARE_EMAIL_DOMAINS: ${CLOUDFLARE_EMAIL_DOMAINS:-}
      CLOUDFLARE_ADMIN_PASSWORD: ${CLOUDFLARE_ADMIN_PASSWORD:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-6daa9f56-5e67-4cb6-ae52-ef89ef912d36}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:8080}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-300}
      IMAP_TIMEOUT: ${IMAP_TIMEOUT:-45}
    ports:
      - "${TAILSCALE_BIND_IP:?set TAILSCALE_BIND_IP}:${TAILSCALE_MAIL_MANAGER_PORT:-18500}:5000"
    expose:
      - "5000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - gateway

networks:
  gateway:
    external: true
    name: ${GATEWAY_NETWORK:-vps-gateway}
